name: Build Home Assistant Add-on

on:
  push:
    branches:
      - main
    paths-ignore:
      - ".github/workflows/lint.yml"
      - ".github/workflows/typecheck.yml"
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to build'
        required: true
        default: '1.0.0'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build ${{ matrix.arch }} add-on
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    strategy:
      matrix:
        arch: [aarch64, amd64, armv7]
      fail-fast: false
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get version
        id: version
        run: |
          if [ "${{ github.event.inputs.version }}" != "" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION=$(grep "version:" dietplanner/config.yaml | head -1 | cut -d'"' -f2)
          fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./dietplanner/Dockerfile
          build-context: ./
          platforms: linux/${{ matrix.arch }}
          push: true
          tags: |
            ghcr.io/mountainlabsde/dietplanner-${{ matrix.arch }}:${{ steps.version.outputs.version }}
            ghcr.io/mountainlabsde/dietplanner-${{ matrix.arch }}:latest
          build-args: |
            BUILD_VERSION=${{ steps.version.outputs.version }}
            BUILD_FROM=ghcr.io/home-assistant/${{ matrix.arch }}-base:3.18



